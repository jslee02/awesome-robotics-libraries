- name: EVA-Client
  url: https://github.com/Noietch/EVA-CLIENT
  github: Noietch/EVA-CLIENT
  description: Unified framework for deploying, evaluating, and collecting data with embodied policies on real robots. Supports
    6+ robot embodiments (dual-arm, humanoid, single-arm), multiple transports (ROS1/ROS2/ZeroMQ/offline replay), pluggable
    policy backends (OpenPI, StarVLA, GR00T, mock, replay), and flexible inference strategies (sync/async/ACT-ensemble/RTC)
    with live latency compensation. Includes browser-based teleoperation, LeRobot v2.1 data capture with QC flags, multi-checkpoint
    evaluation sweeps, and synchronized 3D URDF scene replay.
  _meta:
    stars: 39
    last_commit: '2026-07-07'
    license: Apache-2.0
    language: Python
